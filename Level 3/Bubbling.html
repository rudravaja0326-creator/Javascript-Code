<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boubling and Captruing event</title>
</head>
<body>
    
<ul>
    <li><img height="150px" width="150px"  id="naruto" src="https://images.unsplash.com/photo-1654900365111-34ae7a645c2a?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTh8fG5hcnV0byUyMGFuaW1lfGVufDB8fDB8fHww" alt=""></li>
    <li><img height="150px" width="150px"  id="anime" src="https://plus.unsplash.com/premium_vector-1689096629460-66130f37c1c6?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fGFuaW1lfGVufDB8fDB8fHww" alt=""></li>
    <li><img height="150px" width="150px"  id="zoro" src="https://images.unsplash.com/vector-1777516302924-a8950bb60157?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fGFuaW1lfGVufDB8fDB8fHww" alt=""></li>
</ul>
</body>

    
    <script>
        document.querySelector('#naruto').addEventListener('click',function(e){
            console.log("Hello");
            naruto.style.width = '500px';
        },false);
        
        document.querySelector('ul').addEventListener('click',function(e){
            console.log("UL");
            e.stopPropagation();//stopPropagation() stops an event from bubbling up (or propagating) to parent elements.
            naruto.style.width = '500px';
        },false);//bubbling
        
        
    
    </script>


</html>
