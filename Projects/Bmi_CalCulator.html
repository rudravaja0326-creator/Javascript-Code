<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bmi Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family:  "Poppins", sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.parent {
    width: 400px;
    background-color: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.parent h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

#form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

#form label {
    display: flex;
    flex-direction: column;
    font-weight: bold;
    color: #444;
}

#form input {
    margin-top: 8px;
    padding: 10px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}

#form input:focus {
    outline: none;
    border-color: #4facfe;
}
.bmiresult{
text-align: center;
}
#results {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background-color: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    font-family:  "Poppins", sans-serif;
}

#result:hover {
    background-color: #2388ff;
}

section {
    margin-top: 20px;
    padding: 15px;
    background-color: #f5f5f5;
    border-radius: 10px;
}

section p {
    margin: 8px 0;
    color: #555;
}
</style>
<body>



<div class="parent">
<h2>Bmi Calculator</h2>

<form action="" id="form">
    <label for="">Enter Your Height<input type="text" placeholder="In CM"    id="height"></label>
    <label for="">Enter Your Weight<input type="text" placeholder="In KG"   id="weight"></label>
    <button id="results">Calculate</button>
    <div class="bmiresult"></div>
    
    <section>
        <p>Below 18.5   Underweight</p>
        <p>18.5 – 24.9  Normal weight</p>
        <p>25.0 – 29.9  Overweight</p>
        <p>30.0 and above  Obese</p>
    </section>
</form>
</div>


<script>

const form = document.querySelector('form');

form.addEventListener('submit', function (e) {
    e.preventDefault();

    const height = parseInt(document.querySelector('#height').value);
    const weight = parseInt(document.querySelector('#weight').value);
    const bmiresult = document.querySelector('.bmiresult');

    if (isNaN(height) || height <= 0) {
        bmiresult.innerHTML = "Enter valid height";
    }
    else if (isNaN(weight) || weight <= 0) {
        bmiresult.innerHTML = "Enter valid weight";
    }
    else {
        const bmi = Number(
            (weight / ((height * height) / 10000)).toFixed(2)
        );

        if (bmi < 18.5) {
            bmiresult.innerHTML = `Your BMI is ${bmi} - Underweight`;
        }
        else if (bmi < 25) {
            bmiresult.innerHTML = `Your BMI is ${bmi} - Normal Weight`;
        }
        else if (bmi < 30) {
            bmiresult.innerHTML = `Your BMI is ${bmi} - Overweight`;
        }
        else {
            bmiresult.innerHTML = `Your BMI is ${bmi} - Obese`;
        }
    }
});
</script>
</body>
</html>
