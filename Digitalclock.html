    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DigitalClock</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <style>
    body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #121212;
}

.digi{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}

h2{
    font-size: 4vh;
    color: white;
    text-shadow:
        0 0 5px white,
        0 0 10px white,
        0 0 20px white;
}

.clock{
    width: 250px;
    height: 80px;

    display: flex;
    justify-content: center;
    align-items: center;

    border-radius: 15px;

    background: #ffd60a;
    color: black;

    font-size: 2rem;
    font-weight: 600;

    box-shadow:
        0 0 10px #ffd60a,
        0 0 20px #ffd60a,
        0 0 40px #ffd60a,
        0 0 80px #ffd60a;
}
    </style>
    <body>
        
    <div class="digi">
        <h2>Live time is</h2>
        <div class="clock"></div>
    </div>

    <script>



    const clock = document.querySelector('.clock');

    setInterval(function(){
        let date = new Date();
        clock.innerHTML = date.toLocaleTimeString();
    },1000)
    </script>
    
    </body>
    </html>
